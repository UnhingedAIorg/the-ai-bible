site_name: The AI Bible
site_description: Uncensored. Unfiltered. Unhinged. The ultimate guide to AI, AGI, and beyond.
site_url: https://unhingedaiorg.github.io/the-ai-bible/
repo_name: UnhingedAIorg/the-ai-bible
repo_url: https://github.com/UnhingedAIorg/the-ai-bible

theme:
  name: material
  features:
    - content.code.copy
    - content.tabs.link
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: amber
    - scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  icon:
    logo: material/book-open-page-variant
    repo: fontawesome/brands/github

plugins:
  - search
  - social  # Optional: adds social links

nav:
  - Home: index.md
  - Manifesto: ../MANIFESTO.md
  - Chapters:
    - chapters/
  - Prompt Library: prompts/
  - Essays: essays/

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/UnhingedAIorg/the-ai-bible
