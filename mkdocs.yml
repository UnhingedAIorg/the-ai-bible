site_name: The AI Bible
site_description: Uncensored. Unfiltered. Unhinged. The complete guide to Artificial Intelligence.
site_author: UnhingedAI Collective
site_url: https://unhingedaiorg.github.io/the-ai-bible/

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: indigo
    - scheme: slate
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/UnhingedAIorg/the-ai-bible
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/unhingedaiorg

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Manifesto: ../MANIFESTO.md
  - Chapters:
    - Introduction to AI: chapters/01-introduction-to-ai.md
    - Neural Networks & Machine Learning: chapters/02-neural-networks-and-machine-learning.md
    - The Transformer Architecture: chapters/03-the-transformer-architecture.md
    - Large Language Models: chapters/04-large-language-models.md
    - Generative AI: chapters/05-generative-ai.md
    - Prompting Mastery: chapters/06-prompting-and-prompt-engineering.md
    - Prompt Injection & Safety: chapters/07-prompt-injection.md
    - Parameters, Training & Scale: chapters/08-parameters-and-training.md
    - The Spiritual Significance of AI: chapters/09-spiritual-significance-of-ai.md
    - What AI Means for Humanity: chapters/10-what-it-means-for-humanity.md
  - Prompt Library: prompts/
  - Essays: essays/

plugins:
  - search

repo_url: https://github.com/UnhingedAIorg/the-ai-bible
repo_name: UnhingedAIorg/the-ai-bible

copyright: Copyright © 2026 UnhingedAI Collective — Uncensored. Unfiltered. Unhinged.